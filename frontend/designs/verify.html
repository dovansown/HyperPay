<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Verify your identity | HyperPay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#645cff",
                        "background-light": "#f5f5f8",
                        "background-dark": "#100f23",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Hide arrows in number input */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<!-- Top Navigation -->
<header class="flex items-center justify-between px-6 py-4 md:px-12 border-b border-primary/10 bg-white dark:bg-background-dark/50 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-2">
<div class="text-primary">
<svg class="size-8" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">HyperPay</h2>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center justify-center p-2 rounded-lg bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-[20px]">shield_lock</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-4 sm:p-6 lg:p-8">
<div class="w-full max-w-md">
<!-- Verification Card -->
<div class="bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 shadow-xl rounded-xl p-8 md:p-10">
<div class="flex flex-col items-center text-center mb-8">
<div class="size-16 bg-primary/10 text-primary rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-4xl">stay_primary_portrait</span>
</div>
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">Verify your identity</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed max-w-xs">
                        We've sent a 6-digit verification code to your registered device ending in <span class="font-semibold text-slate-700 dark:text-slate-200">...8922</span>.
                    </p>
</div>
<form class="space-y-8">
<!-- OTP Input Group -->
<div class="flex justify-between gap-2 sm:gap-4">
<input autofocus="" class="w-12 h-14 sm:w-14 sm:h-16 text-center text-xl font-bold border-2 border-slate-200 dark:border-slate-800 bg-transparent rounded-lg focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" type="number"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-xl font-bold border-2 border-slate-200 dark:border-slate-800 bg-transparent rounded-lg focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" type="number"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-xl font-bold border-2 border-slate-200 dark:border-slate-800 bg-transparent rounded-lg focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" type="number"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-xl font-bold border-2 border-slate-200 dark:border-slate-800 bg-transparent rounded-lg focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" type="number"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-xl font-bold border-2 border-slate-200 dark:border-slate-800 bg-transparent rounded-lg focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" type="number"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-xl font-bold border-2 border-slate-200 dark:border-slate-800 bg-transparent rounded-lg focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" type="number"/>
</div>
<div class="space-y-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2" type="submit">
<span>Verify and continue</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<div class="flex flex-col items-center gap-2">
<button class="text-sm font-medium text-primary hover:underline underline-offset-4" type="button">
                                Didn't receive a code? Resend
                            </button>
<button class="text-xs font-medium text-slate-400 dark:text-slate-500 hover:text-slate-600 transition-colors" type="button">
                                Use another verification method
                            </button>
</div>
</div>
</form>
<div class="mt-10 pt-8 border-t border-slate-100 dark:border-slate-800">
<div class="flex items-center justify-center gap-2 text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined text-[16px]">lock</span>
<span class="text-[11px] uppercase tracking-widest font-semibold">Secure Encryption Enabled</span>
</div>
</div>
</div>
<!-- Footer Links -->
<footer class="mt-8 flex justify-center gap-6 text-xs font-medium text-slate-400 dark:text-slate-500">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Help Center</a>
</footer>
</div>
</main>
<!-- Support Bubble -->
<div class="fixed bottom-6 right-6">
<button class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 size-12 rounded-full shadow-lg flex items-center justify-center text-slate-600 dark:text-slate-300 hover:text-primary transition-colors">
<span class="material-symbols-outlined">help</span>
</button>
</div>
</body></html>
