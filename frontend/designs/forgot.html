<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#645cff",
                        "background-light": "#f5f5f8",
                        "background-dark": "#100f23",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Forgot Password - HyperPay</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4">
<div class="mb-8 flex items-center gap-2 text-slate-900 dark:text-slate-100">
<div class="flex items-center justify-center bg-primary rounded-lg p-1.5 text-white">
<span class="material-symbols-outlined text-2xl">bolt</span>
</div>
<h2 class="text-xl font-bold leading-tight tracking-tight">HyperPay</h2>
</div>
<div class="w-full max-w-[440px] bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-primary/5 p-8 border border-slate-200/60 dark:border-slate-800">
<div class="mb-8">
<div class="flex h-12 w-12 items-center justify-center rounded-full bg-primary/10 mb-4">
<span class="material-symbols-outlined text-primary text-2xl">lock_reset</span>
</div>
<h1 class="text-2xl font-semibold text-slate-900 dark:text-slate-100">Forgot password?</h1>
<p class="mt-2 text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
                    Enter the email address associated with your account and we'll send you a link to reset your password.
                </p>
</div>
<form action="#" class="space-y-6" method="POST">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5" for="email">
                        Email address
                    </label>
<div class="relative">
<input class="block w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-sm" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<button class="flex w-full items-center justify-center rounded-lg bg-primary px-4 py-3 text-sm font-semibold text-white shadow-sm hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all" type="submit">
                    Send reset link
                </button>
</form>
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 flex justify-center">
<a class="flex items-center gap-1.5 text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">
<span class="material-symbols-outlined text-lg">arrow_back</span>
                    Back to sign in
                </a>
</div>
</div>
<div class="mt-8 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                © 2024 HyperPay Inc. 
                <span class="mx-1.5">·</span>
<a class="hover:underline" href="#">Privacy</a>
<span class="mx-1.5">·</span>
<a class="hover:underline" href="#">Terms</a>
</p>
</div>
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-primary/50 to-primary"></div>
</div>
</body></html>
