<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#635BFF",
                "background-light": "#F6F9FC",
                "background-dark": "#100f23",
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            box-shadow: 0 50px 100px -20px rgba(50, 50, 93, 0.25), 0 30px 60px -30px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-10 flex items-center gap-2">
<div class="bg-primary w-10 h-10 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-2xl" data-icon="payments">payments</span>
</div>
<span class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">HyperPay</span>
</div>
<!-- Login Card -->
<div class="bg-white dark:bg-slate-900 w-full p-8 md:p-10 rounded-xl login-card border border-slate-200/60 dark:border-slate-800">
<h1 class="text-2xl font-semibold text-slate-900 dark:text-slate-100 mb-8">Sign in to your account</h1>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="email">Email</label>
<input class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="email" placeholder="jane.doe@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
</div>
<input class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Remember Me (Optional but Stripe-like) -->
<div class="flex items-center gap-2">
<input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400" for="remember">Keep me signed in</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-opacity-90 text-white font-semibold py-3 rounded-lg shadow-md transition-all active:scale-[0.98]" type="submit">
                    Continue
                </button>
</form>
</div>
<!-- Footer Links -->
<div class="mt-8 text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                Don't have an account? 
                <a class="text-primary font-medium hover:text-primary/80 transition-colors" href="#">Sign up</a>
</p>
</div>
<!-- Bottom Policy Links -->
<div class="mt-16 flex gap-6 text-xs text-slate-400 font-medium">
<a class="hover:text-slate-600 transition-colors" href="#">© HyperPay</a>
<a class="hover:text-slate-600 transition-colors" href="#">Privacy &amp; Terms</a>
<a class="hover:text-slate-600 transition-colors" href="#">Contact</a>
</div>
</div>
</body></html>
