<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | HyperPay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#645cff",
                        "background-light": "#f5f5f8",
                        "background-dark": "#100f23",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .form-input:focus {
            border-color: #645cff;
            box-shadow: 0 0 0 4px rgba(100, 92, 255, 0.1);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display flex flex-col">
<div class="flex-grow flex items-center justify-center p-6">
<div class="w-full max-w-[440px]">
<!-- Header/Logo Area -->
<div class="mb-10 flex items-center gap-2">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-xl">payments</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold tracking-tight">HyperPay</h1>
</div>
<!-- Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-200 dark:border-slate-800 p-8 md:p-10">
<div class="mb-8">
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-semibold mb-2">Create your account</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Join thousands of businesses processing payments with HyperPay.</p>
</div>
<form class="space-y-5">
<!-- Full Name -->
<div class="space-y-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium" for="name">Full name</label>
<input class="w-full h-11 px-3.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all duration-200" id="name" placeholder="Jane Doe" type="text"/>
</div>
<!-- Email -->
<div class="space-y-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium" for="email">Email address</label>
<input class="w-full h-11 px-3.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all duration-200" id="email" placeholder="jane@example.com" type="email"/>
</div>
<!-- Password -->
<div class="space-y-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium" for="password">Password</label>
<input class="w-full h-11 px-3.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Organization Name -->
<div class="space-y-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium" for="org">Organization name</label>
<input class="w-full h-11 px-3.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all duration-200" id="org" placeholder="Acme Corp" type="text"/>
</div>
<!-- Terms checkbox -->
<div class="flex items-start gap-3 py-1">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary" id="terms" type="checkbox"/>
</div>
<label class="text-xs text-slate-500 dark:text-slate-400 leading-tight" for="terms">
                            I agree to the <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a> and <a class="text-primary hover:underline font-medium" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Submit -->
<button class="w-full h-11 bg-primary hover:bg-primary/90 text-white font-semibold rounded-lg transition-colors duration-200 shadow-sm" type="submit">
                        Create account
                    </button>
</form>
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800">
<p class="text-center text-sm text-slate-600 dark:text-slate-400">
                        Already have an account? <a class="text-primary font-semibold hover:underline" href="#">Log in</a>
</p>
</div>
</div>
</div>
</div>
<!-- Footer -->
<footer class="p-8">
<div class="flex flex-col md:flex-row items-center justify-center gap-6 text-sm text-slate-500 dark:text-slate-400">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-sm">copyright</span>
<span>2024 HyperPay</span>
</div>
<div class="flex gap-6">
<a class="hover:text-primary transition-colors" href="#">Contact Support</a>
<a class="hover:text-primary transition-colors" href="#">Privacy &amp; Terms</a>
</div>
</div>
</footer>
</body></html>
