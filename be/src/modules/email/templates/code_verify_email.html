<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify your email - HyperPay</title>
  <style>body{font-family:Inter,sans-serif;margin:0;padding:24px;background:#f5f5f8}.box{max-width:560px;margin:0 auto;background:#fff;border-radius:12px;padding:32px;border:1px solid #e2e8f0}.code{font-size:28px;font-weight:700;letter-spacing:0.3em;color:#645cff;margin:24px 0}.btn{display:inline-block;background:#645cff;color:#fff!important;padding:14px 24px;border-radius:8px;text-decoration:none;font-weight:600;margin-top:16px}</style>
</head>
<body>
  <div class="box">
    <h1 style="font-size:24px;color:#0f172a;margin:0 0 8px">Verify your email address</h1>
    <p style="color:#64748b;margin:0">Use the 6-digit verification code below.</p>
    <div class="code">{{code}}</div>
    <p style="font-size:12px;color:#645cff;text-transform:uppercase;margin:8px 0">Expires in {{expiresMinutes}} minutes</p>
    <a href="{{verifyLink}}" class="btn">Verify Account</a>
    <p style="font-size:14px;color:#94a3b8;margin-top:24px">If you didn't request this code, you can safely ignore this email.</p>
  </div>
</body>
</html>
