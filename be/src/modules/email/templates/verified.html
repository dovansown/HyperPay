<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verified - HyperPay</title>
  <style>body{font-family:Inter,sans-serif;margin:0;padding:24px;background:#f6f9fc}.box{max-width:400px;margin:0 auto;background:#fff;border-radius:12px;padding:32px;border:1px solid #e2e8f0}.btn{display:inline-block;background:#635BFF;color:#fff!important;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600}</style>
</head>
<body>
  <div class="box">
    <h2 style="font-size:22px;color:#0f172a;margin:0 0 8px">Email verified</h2>
    <p style="color:#64748b;margin:0 0 24px">{{message}}</p>
    <a href="{{continueLink}}" class="btn">Continue to Dashboard</a>
  </div>
</body>
</html>
